<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dcheck</title>
  <meta name="color-scheme" content="dark">
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <!-- ═══ Title Bar (custom, frameless) ═══ -->
  <div class="titlebar" id="titlebar">
    <div class="titlebar-left">
      <img src="icons/icon16.png" class="titlebar-icon" alt="">
      <span class="titlebar-brand">dcheck</span>
      <span class="titlebar-status" id="titlebar-status">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">CONNECTING</span>
      </span>
    </div>
    <div class="titlebar-actions">
      <button class="titlebar-btn" id="btn-settings" aria-label="Settings">⚙</button>
      <button class="titlebar-close" id="btn-close" aria-label="Close">✕</button>
    </div>
  </div>

  <!-- ═══ Stats Row ═══ -->
  <div class="stats-row" id="stats-row">
    <div class="stat">
      <span class="stat-label">PING</span>
      <span class="stat-value" id="stat-ping">--</span>
    </div>
    <div class="stat">
      <span class="stat-label">DROPS</span>
      <span class="stat-value stat-alert" id="stat-drops">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">UPTIME</span>
      <span class="stat-value" id="stat-uptime">--%</span>
    </div>
    <div class="stat">
      <span class="stat-label">TOTAL</span>
      <span class="stat-value" id="stat-total">0</span>
    </div>
  </div>

  <!-- ═══ Filter Row ═══ -->
  <div class="filter-row" id="filter-row">
    <button class="filter-btn" data-range="3600">1H</button>
    <button class="filter-btn" data-range="21600">6H</button>
    <button class="filter-btn active" data-range="86400">24H</button>
    <button class="filter-btn" data-range="0">ALL</button>
  </div>

  <!-- ═══ Graph ═══ -->
  <div class="graph-wrap" id="graph-wrap">
    <canvas id="graph"></canvas>
  </div>

  <!-- ═══ Event Log ═══ -->
  <div class="event-log" id="event-log">
    <div class="event-log-header">
      <span class="event-log-title">EVENTS</span>
      <span class="event-log-count" id="event-count">0</span>
    </div>
    <div class="event-log-entries" id="event-entries">
      <div class="event-empty">No disconnect events</div>
    </div>
  </div>
  
  <!-- ═══ Settings Overlay ═══ -->
  <div class="settings-overlay" id="settings-overlay">
    <div class="settings-header">
      <span class="settings-title">SETTINGS</span>
    </div>
    <div class="settings-body">
      <div class="setting-group">
        <label class="setting-label" for="setting-startup">RUN ON STARTUP</label>
        <label class="switch">
          <input type="checkbox" id="setting-startup">
          <span class="slider"></span>
        </label>
      </div>
      <div class="setting-group">
        <label class="setting-label" for="setting-target">PING TARGET</label>
        <input type="text" id="setting-target" class="setting-input" placeholder="8.8.8.8">
      </div>
      <div class="setting-group">
        <label class="setting-label" for="setting-interval">PING INTERVAL (SEC)</label>
        <input type="number" id="setting-interval" class="setting-input" min="1" max="60" placeholder="5">
      </div>
      <div class="setting-group">
        <label class="setting-label" for="setting-latency">LATENCY THRESHOLD (MS)</label>
        <input type="number" id="setting-latency" class="setting-input" min="10" max="2000" placeholder="100">
      </div>
      <div class="setting-group database-group">
        <label class="setting-label">PACKET LOGS</label>
        <button class="settings-btn danger-btn" id="btn-clear-logs">[ CLEAR LOGS ]</button>
      </div>
    </div>
    <div class="settings-footer">
      <button class="settings-btn save-btn" id="btn-save-settings">[ SAVE ]</button>
      <button class="settings-btn cancel-btn" id="btn-cancel-settings">[ CANCEL ]</button>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
